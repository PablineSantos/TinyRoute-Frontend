<div class="auth-wrapper">
  <div class="tr-card auth-card">
    <div class="auth-header">
      <h2>Registar</h2>
      <p class="subtitle">Crie sua conta no TinyRoute para gerir seus links e acompanhar estatísticas.</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" class="tr-input" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" class="tr-input" placeholder="Escolha um nome de usuário (Opcional)">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input [(ngModel)]="password" type="password" class="tr-input" placeholder="Minimo 6 caracteres">
    </div>

    <button class="btn-primary btn-block" style="margin-top: 1rem;" (click)="register()">Criar conta</button>

    <p class="auth-footer">Já possui conta? <a href="/login">Entrar</a></p>
  </div>
</div>
